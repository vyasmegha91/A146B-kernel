name: Build A146B Kernel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison flex libssl-dev \
          make git curl zip \
          libelf-dev python3 \
          clang lld llvm \
          binutils-aarch64-linux-gnu \
          gcc-aarch64-linux-gnu

    - name: Download Kernel Source
      run: |
        curl -L -o kernel.tar.gz \
          https://github.com/vyasmegha91/A146B-kernel/releases/download/v1.0/Kernel.tar.gz
        mkdir kernel-source
        tar -xzf kernel.tar.gz -C kernel-source --strip-components=1

    - name: Check Defconfig
      run: |
        cd kernel-source
        echo "=== Available defconfigs ==="
        ls arch/arm64/configs/ | grep -i "a14\|exynos\|s5e"

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: defconfig-list
        path: kernel-source/arch/arm64/configs/

name: Build A146B Kernel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison flex libssl-dev \
          make gcc git curl zip \
          libelf-dev python3

    - name: Download Toolchain
      run: |
        git clone --depth=1 \
          https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 \
          toolchain

    - name: Download Kernel Source
      run: |
        curl -L -o kernel.tar.gz \
          https://github.com/vyasmegha91/A146B-kernel/releases/download/v1.0/Kernel.tar.gz
        mkdir kernel-source
        tar -xzf kernel.tar.gz -C kernel-source --strip-components=1

    - name: Build Kernel
      run: |
        export ARCH=arm64
        export CROSS_COMPILE=$(pwd)/toolchain/bin/aarch64-linux-android-
        cd kernel-source
        make ARCH=arm64 exynos1330-a14xmxx_defconfig
        make ARCH=arm64 -j$(nproc)

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: kernel
        path: kernel-source/arch/arm64/boot/Image

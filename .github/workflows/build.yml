name: Build A146B Kernel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison flex libssl-dev \
          make git curl zip \
          libelf-dev python3 \
          clang lld llvm \
          binutils-aarch64-linux-gnu \
          gcc-aarch64-linux-gnu

    - name: Download Kernel Source
      run: |
        curl -L -o kernel.tar.gz \
          https://github.com/vyasmegha91/A146B-kernel/releases/download/v1.0/Kernel.tar.gz
        mkdir kernel-source
        tar -xzf kernel.tar.gz -C kernel-source --strip-components=1

    - name: Build Kernel
      run: |
        export ARCH=arm64
        cd kernel-source
        echo "CONFIG_SCSI_UFS_EXYNOS_SRPMB=n" >> arch/arm64/configs/s5e8535-a14xxx_defconfig
        echo "CONFIG_SCSI_UFS_EXYNOS_FMP=n" >> arch/arm64/configs/s5e8535-a14xxx_defconfig
        echo "CONFIG_SCSI_UFS_EXYNOS=n" >> arch/arm64/configs/s5e8535-a14xxx_defconfig
        echo "CONFIG_SCSI_UFS_EXYNOS_BLOCK=n" >> arch/arm64/configs/s5e8535-a14xxx_defconfig
        echo "CONFIG_SCSI_SRPMB=n" >> arch/arm64/configs/s5e8535-a14xxx_defconfig
        find . -name "*.c" -exec grep -l "ufs-cal-if\|ufs-vs-mmio\|ufs-cal-virt\|ufs-vs-regs\|ufs-vs-log" {} \; | while read f; do
          echo "" > "$f"
        done
        make ARCH=arm64 \
          CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          s5e8535-a14xxx_defconfig
        make ARCH=arm64 \
          CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          -j$(nproc)

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: kernel-image
        path: kernel-source/arch/arm64/boot/Image
